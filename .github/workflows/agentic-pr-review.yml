name: 🤖 Qwen Code Agentic Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  review:
    name: Agentic Review
    # Trigger on PR events or manual comment "@qwen-code review"
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@qwen-code review'))
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || format('refs/pull/{0}/head', github.event.issue.number) }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run Agentic Reviewer
        run: node scripts/agentic_reviewer.js
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.ai.camer.digital/v1' }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'gemini-2.5-flash' }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          ARTIFACTS_DIR: ${{ github.workspace }}/agent-artifacts

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agentic-review-artifacts
          path: ${{ github.workspace }}/agent-artifacts/
